<!DOCTYPE html>
<html>
<head><title>Authorisation Complete</title></head>
<body style="font-family:Arial,sans-serif;text-align:center;padding:80px;background:#07070f;color:#fff">
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error_description') || params.get('error');
  if (code) {
    document.write(`
      <div style="font-size:48px">&#10003;</div>
      <h2 style="color:#00e5a0">Authorised!</h2>
      <p style="color:#aaa">Copy the code below and paste it back into your terminal:</p>
      <input id="c" value="${code}" readonly style="width:90%;padding:12px;font-size:14px;background:#1a1a2e;color:#fff;border:1px solid #444;border-radius:6px">
      <br><br>
      <button onclick="navigator.clipboard.writeText('${code}');this.textContent='Copied!'"
        style="padding:10px 28px;background:#00e5a0;color:#000;border:none;border-radius:6px;font-size:16px;cursor:pointer">
        Copy Code
      </button>
    `);
  } else {
    document.write(`
      <div style="font-size:48px">&#10007;</div>
      <h2 style="color:#f87171">Authorisation failed</h2>
      <p style="color:#aaa">${error || 'Unknown error'}</p>
    `);
  }
</script>
</body>
</html>
